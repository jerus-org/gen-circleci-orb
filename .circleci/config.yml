version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.85"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.3.0

  orb-tools: circleci/orb-tools@12.4.0
jobs:
  build-binary:
    docker:
      - image: rust:latest@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    steps:
      - checkout
      - run:
          name: Build binary
          command: cargo build --release
      - persist_to_workspace:
          root: target/release
          paths: [gen-circleci-orb]
  regenerate-orb:
    docker:
      - image: rust:latest@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/bin
      - run:
          name: Install gnupg (required by auto-record GPG signing)
          command: apt-get update && apt-get install -y gnupg
      - run:
          name: Regenerate orb source
          # Auto-record ([record] in gen-circleci-orb.toml) is gated inside the
          # binary: it records (signed commit + push to the PR branch) only on a
          # regular PR branch, and no-ops on main / forked PRs. The `release`
          # context (attached in the workflow) supplies BOT_* + GITHUB_TOKEN.
          command: |
            export PATH="/tmp/bin:$PATH"
            gen-circleci-orb generate \
              --binary gen-circleci-orb \
              --orb-namespace jerus-org \
              --orb-dir orb \
              --circleci-cli-version 0.1.36202


workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main
      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore: /pull\/[0-9]+/
      - toolkit/code_coverage:
          package: gen-circleci-orb
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
          requires:
            - security with sonarcloud
      - build-binary:
          requires: [toolkit/common_tests]
      - regenerate-orb:
          # `release` provides BOT_* signing material; `bot-check` provides
          # GITHUB_TOKEN (contents:write). Auto-record fires only on PR branches;
          # no-ops on main/forks (binary-gated).
          context: [release, bot-check]
          requires: [build-binary]
      - orb-tools/pack:
          name: pack-orb
          source_dir: orb/src
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          source_dir: orb/src
          requires: [pack-orb]
