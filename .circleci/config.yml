version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.89"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.5.1
  orb-tools: circleci/orb-tools@12.4.0
  # Consumed by the orb-release workflow's build_mcp_server job (Mechanism A:
  # gen-orb-mcp owns the MCP build). Declared here (not in a managed block) so
  # `update` skips re-inserting it and stays round-trip stable.
  gen-orb-mcp: jerus-org/gen-orb-mcp@0.1.51
  # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
  gen-circleci-orb: jerus-org/gen-circleci-orb@0.0.61
  # <<< gen-circleci-orb
workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main
      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore: /pull\/[0-9]+/
      - toolkit/code_coverage:
          package: gen-circleci-orb
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
          requires:
            - security with sonarcloud
      # build-binary (gen-circleci-orb/build_rust_binary) starts in parallel with
      # the test suite; the gate moves to regenerate-orb so the slow release build
      # overlaps the tests. regenerate-orb records (no_record=false): on a diff it
      # GPG-signs, commits and
      # pushes the regen early. That push starts a fresh pipeline and CircleCI
      # auto-cancel-redundant kills this now-stale run, so the suite isn't run to
      # completion twice; the fresh run finds the orb in sync and its required
      # checks gate the merge. Gated on build-binary + common_tests so a regen is
      # only pushed when the code passes. `release` supplies the BOT_* signing
      # material; the write key is loaded via the fingerprint.
      # pack/review consume the regenerated orb from the workspace (checkout:false
      # + attach_workspace), so they validate exactly what was just generated.
      # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
      - gen-circleci-orb/build_rust_binary:
          name: build-binary
          package: gen-circleci-orb
          rust_image: jerusdp/ci-rust:rolling-6mo@sha256:2256d29b9b92041dd29b9575aeac5c45abe539696c9db670c685b47f67df1f01
      - gen-circleci-orb/generate:
          name: regenerate-orb
          binary: gen-circleci-orb
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          check_ci_wiring: true
          ssh_fingerprint: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"
          persist_orb_workspace: true
          context: [release]
          requires: [build-binary, toolkit/common_tests]
          filters:
            branches:
              ignore:
                - main
      - orb-tools/pack:
          name: pack-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [regenerate-orb]
          filters:
            branches:
              ignore:
                - main
      - orb-tools/review:
          name: review-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [pack-orb]
          filters:
            branches:
              ignore:
                - main
      # <<< gen-circleci-orb

  # >>> gen-circleci-orb (managed — edits overwritten by 'gen-circleci-orb update')
  orb-release:
    jobs:
      - gen-circleci-orb/build_rust_binary:
          name: orb-release-binary
          package: gen-circleci-orb
          rust_image: jerusdp/ci-rust:rolling-6mo@sha256:2256d29b9b92041dd29b9575aeac5c45abe539696c9db670c685b47f67df1f01
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/generate:
          name: verify-orb
          binary: gen-circleci-orb
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          check: true
          check_ci_wiring: false
          requires: [orb-release-binary]
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - orb-tools/pack:
          name: orb-release-pack
          checkout: false
          source_dir: orb/src
          requires: [verify-orb]
          pre-steps:
            - checkout
            - run:
                name: Inject release version into executor default tag
                command: |
                  VERSION=${CIRCLE_TAG#gen-circleci-orb-v}
                  echo "Injecting version: ${VERSION}"
                  sed -i "s/default: latest/default: ${VERSION}/" orb/src/executors/default.yml
                  echo "Updated executor:"
                  cat orb/src/executors/default.yml
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/build_container:
          name: orb-release-container
          binary: gen-circleci-orb
          docker_namespace: jerusdp
          orb_dir: orb
          crate_tag_prefix: gen-circleci-orb-v
          requires: [verify-orb]
          context: [docker]
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - gen-circleci-orb/ensure_orb_registered:
          name: orb-release-ensure-registered-jerus-org
          orb_name: jerus-org/gen-circleci-orb
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - orb-tools/publish:
          name: publish-orb-jerus-org
          pre-steps:
            - run:
                name: Normalize CIRCLE_TAG for orb version
                command: |
                  VERSION=${CIRCLE_TAG#gen-circleci-orb-v}
                  echo "export CIRCLE_TAG=v${VERSION}" >> "$BASH_ENV"
          orb_name: jerus-org/gen-circleci-orb
          pub_type: production
          vcs_type: github
          enable_pr_comment: false
          requires: [orb-release-container, orb-release-pack, orb-release-ensure-registered-jerus-org]
          context: [orb-publishing]
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/

      - gen-orb-mcp/build_mcp_server:
          name: build-mcp-server
          binary_name: gen-circleci-orb
          tag_prefix: gen-circleci-orb-v
          orb_path: orb/src/@orb.yml
          earliest_version: "0.0.11"
          requires: [publish-orb-jerus-org]
          context: [release, bot-check, pcu-app]
          filters:
            tags:
              only: /^gen-circleci-orb-v.*/
            branches:
              ignore: /.*/
  # <<< gen-circleci-orb
