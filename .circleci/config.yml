version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.85"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.4.2

  orb-tools: circleci/orb-tools@12.4.0
jobs:
  build-binary:
    docker:
      - image: rust:latest@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    steps:
      - checkout
      - run:
          name: Build binary
          command: cargo build --release
      - persist_to_workspace:
          root: target/release
          paths: [gen-circleci-orb]
  regenerate-orb:
    docker:
      - image: rust:latest@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/bin
      - run:
          name: Install gnupg (required by auto-record GPG signing)
          command: apt-get update && apt-get install -y gnupg
      - run:
          name: Regenerate orb source
          # Model B: the binary regenerates the orb but does NOT push
          # (--no-record). The orb dir is persisted to the workspace below so
          # pack/review validate the *regenerated* orb, and a single
          # end-of-workflow push job commits + pushes it once, after validation.
          command: |
            export PATH="/tmp/bin:$PATH"
            gen-circleci-orb generate \
              --binary gen-circleci-orb \
              --orb-namespace jerus-org \
              --orb-dir orb \
              --circleci-cli-version 0.1.36202 \
              --no-record
      - persist_to_workspace:
          root: .
          paths:
            - orb


workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main
      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore: /pull\/[0-9]+/
      - toolkit/code_coverage:
          package: gen-circleci-orb
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
          requires:
            - security with sonarcloud
      - build-binary:
          requires: [toolkit/common_tests]
      - regenerate-orb:
          # `release` provides BOT_* signing material. The binary does not push
          # (--no-record); it persists the regenerated orb to the workspace.
          context: [release, bot-check]
          requires: [build-binary]
      # pack/review consume the regenerated orb from the workspace (checkout:false
      # + attach_workspace), so they validate exactly what was just generated.
      - orb-tools/pack:
          name: pack-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [pack-orb]
