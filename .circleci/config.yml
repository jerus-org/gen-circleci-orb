version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.89"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.4.2
  orb-tools: circleci/orb-tools@12.4.0
  gen-circleci-orb: jerus-org/gen-circleci-orb@0.0.54

workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/optional_builds:
          filters:
            branches:
              ignore: main
      - toolkit/idiomatic_rust:
          filters:
            branches:
              ignore: main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore: /pull\/[0-9]+/
      - toolkit/code_coverage:
          package: gen-circleci-orb
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
          requires:
            - security with sonarcloud
      # build-binary starts in parallel with the test suite (no test-job
      # dependency); the gate moves to regenerate-orb so the slow release build
      # overlaps the tests instead of running serially after them. Dogfoods the
      # orb's own build_rust_binary job — the fresh binary reaches regenerate-orb
      # via the workspace, exactly as every consumer (e.g. gen-orb-mcp) does.
      - gen-circleci-orb/build_rust_binary:
          name: build-binary
          package: gen-circleci-orb
      # regenerate-orb records (default no_record=false): on a diff it GPG-signs,
      # commits and pushes the regen early. That push starts a fresh pipeline and
      # CircleCI auto-cancel-redundant kills this now-stale run, so the suite isn't
      # run to completion twice; the fresh run finds the orb in sync and its
      # required checks gate the merge. Gated on build-binary + common_tests so a
      # regen is only pushed when the code passes. `release` supplies the BOT_*
      # signing material; the write key is loaded via the fingerprint. Dogfoods the
      # orb's own generate job: attach_workspace runs the FRESHLY-BUILT binary (not
      # the published orb's baked-in one), so this repo eats its own dog food.
      - gen-circleci-orb/generate:
          name: regenerate-orb
          binary: gen-circleci-orb
          orb_namespace: jerus-org
          orb_dir: orb
          attach_workspace: true
          persist_orb_workspace: true
          ssh_fingerprint: "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"
          context: [release]
          requires: [build-binary, toolkit/common_tests]
      # pack/review consume the regenerated orb from the workspace (checkout:false
      # + attach_workspace), so they validate exactly what was just generated.
      - orb-tools/pack:
          name: pack-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [regenerate-orb]
      - orb-tools/review:
          name: review-orb
          checkout: false
          source_dir: orb/src
          pre-steps:
            - attach_workspace:
                at: .
          requires: [pack-orb]
