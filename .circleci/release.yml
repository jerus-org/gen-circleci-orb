version: 2.1

parameters:
  gen_circleci_orb_version:
    type: string
    default: ""
    description: "Override crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.1.4

  orb-tools: circleci/orb-tools@12.3.3
  docker: circleci/docker@3.0.1
jobs:
  build-container:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: |
            docker build -t jerusdp/gen-circleci-orb:${CIRCLE_TAG} orb
      - run:
          name: Push Docker image
          command: |
            docker push jerusdp/gen-circleci-orb:${CIRCLE_TAG}


workflows:
  release:
    jobs:
      - toolkit/calculate_versions:
          name: calculate-versions
          crates: "gen-circleci-orb:gen-circleci-orb-v"
          crate_version_overrides: "gen-circleci-orb:<< pipeline.parameters.gen_circleci_orb_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires:
            - calculate-versions

      - toolkit/release_crate:
          name: release-gen-circleci-orb
          requires:
            - approve-release
          context:
            - release
            - bot-check
            - pcu-app
          package: gen-circleci-orb
          crate_tag_prefix: gen-circleci-orb-v
          build_binary: true
          binary_name: gen-circleci-orb

      - toolkit/release_prlog:
          requires:
            - release-gen-circleci-orb
          context:
            - release
            - bot-check
            - pcu-app
      - orb-tools/pack:
          name: pack-orb-release
          source_dir: orb/src
          requires: [release-gen-circleci-orb]
      - build-container:
          requires: [release-gen-circleci-orb]
          context: [docker-credentials]
      - orb-tools/publish:
          name: publish-orb-jerus-org
          orb_name: jerus-org/gen-circleci-orb
          pub_type: production
          requires: [build-container, pack-orb-release]
          context: [orb-publishing]
