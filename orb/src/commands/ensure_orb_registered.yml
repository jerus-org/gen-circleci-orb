description: >
  Ensure a CircleCI orb is registered before publishing.
  Runs circleci orb info; if the orb is not found, creates it.
  Accepts circleci CLI exit 255 (TLS/network quirks) as non-fatal.
parameters:
  orb_name:
    type: string
    description: The orb name to check/register (e.g. my-org/my-orb)
  private:
    type: boolean
    description: Register the orb as private when creating it
    default: false
steps:
  - run:
      name: Ensure orb is registered
      command: <<include(scripts/ensure_orb_registered.sh)>>
      environment:
        ORB_NAME: << parameters.orb_name >>
        PRIVATE: << parameters.private >>
