description: >
  Ensure a CircleCI orb is registered before publishing.
  Calls the CircleCI GraphQL API — no circleci developer CLI required.
parameters:
  orb_name:
    type: string
    description: The orb name to check/register (e.g. my-org/my-orb)
  private:
    type: boolean
    description: Register the orb as private when creating it
    default: false
steps:
  - run:
      name: Ensure orb is registered
      command: |
        PRIVATE_FLAG=""
        if [ "<< parameters.private >>" = "true" ]; then
          PRIVATE_FLAG="--private"
        fi
        gen-circleci-orb ensure-orb-registered \
          --orb-name "<< parameters.orb_name >>" \
          $PRIVATE_FLAG
