description: Wire orb generation into an existing repo's CI configuration
parameters:
  binary:
    type: string
    description: Name of the binary to introspect (must be on PATH)
  namespace:
    type: string
    description: CircleCI namespace(s) to publish the orb under (repeatable)
  build_workflow:
    type: string
    description: Name of the build/validation workflow to patch
  release_workflow:
    type: string
    description: Name of the release workflow to patch
  requires_job:
    type: string
    description: Job in the build workflow that regenerate-orb should require
    default: ''
  release_after_job:
    type: string
    description: Job in the release workflow after which build-container should run
    default: ''
  orb_dir:
    type: string
    description: Output directory for the generated orb source (relative to repo root)
    default: orb
  ci_dir:
    type: string
    description: Path to the .circleci/ directory
    default: .circleci
  orb_tools_version:
    type: string
    description: circleci/orb-tools version to pin in generated CI
    default: 12.3.3
  docker_orb_version:
    type: string
    description: circleci/docker orb version to pin in generated CI
    default: 3.2.0
  docker_namespace:
    type: string
    description: Docker Hub (or registry) namespace for the built container image
  docker_context:
    type: string
    description: CircleCI context name holding Docker Hub credentials
    default: docker-credentials
  orb_context:
    type: string
    description: CircleCI context name holding orb publishing credentials
    default: orb-publishing
  mcp:
    type: boolean
    description: Wire in toolkit/build_mcp_server after orb publish (requires jerus-org/circleci-toolkit)
    default: false
  dry_run:
    type: boolean
    description: Show planned changes without modifying any files
    default: false
steps:
- run:
    name: init
    command: |-
      gen-circleci-orb init \
        --binary "<< parameters.binary >>" \
        --namespace "<< parameters.namespace >>" \
        --build-workflow "<< parameters.build_workflow >>" \
        --release-workflow "<< parameters.release_workflow >>" \
        <<# parameters.requires_job >>--requires-job "<< parameters.requires_job >>"<</ parameters.requires_job >> \
        <<# parameters.release_after_job >>--release-after-job "<< parameters.release_after_job >>"<</ parameters.release_after_job >> \
        <<# parameters.orb_dir >>--orb-dir "<< parameters.orb_dir >>"<</ parameters.orb_dir >> \
        <<# parameters.ci_dir >>--ci-dir "<< parameters.ci_dir >>"<</ parameters.ci_dir >> \
        <<# parameters.orb_tools_version >>--orb-tools-version "<< parameters.orb_tools_version >>"<</ parameters.orb_tools_version >> \
        <<# parameters.docker_orb_version >>--docker-orb-version "<< parameters.docker_orb_version >>"<</ parameters.docker_orb_version >> \
        --docker-namespace "<< parameters.docker_namespace >>" \
        <<# parameters.docker_context >>--docker-context "<< parameters.docker_context >>"<</ parameters.docker_context >> \
        <<# parameters.orb_context >>--orb-context "<< parameters.orb_context >>"<</ parameters.orb_context >> \
        <<# parameters.mcp >>--mcp<</ parameters.mcp >> \
        <<# parameters.dry_run >>--dry-run<</ parameters.dry_run >>
