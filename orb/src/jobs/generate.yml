description: Run generate command in a dedicated job.
executor: default
parameters:
  binary:
    type: string
    description: Name of the binary to introspect (must be on PATH)
  orb_namespace:
    type: string
    description: CircleCI orb namespace(s) to publish the orb under (repeatable)
  output:
    type: string
    description: Project root directory (orb source is written to <output>/<orb-dir>/)
    default: .
  install_method:
    type: enum
    description: How the binary is installed in the generated Docker image
    default: binstall
    enum:
    - binstall
    - apt
  base_image:
    type: string
    description: Base Docker image for the generated executor
    default: debian:12-slim
  home_url:
    type: string
    description: Home URL for the orb registry display section
    default: ''
  source_url:
    type: string
    description: Source URL for the orb registry display section
    default: ''
  orb_dir:
    type: string
    description: 'Subdirectory within --output where orb source is written (default: orb)'
    default: orb
  dry_run:
    type: boolean
    description: Show planned output without writing any files
    default: false
  attach_workspace:
    type: boolean
    description: Attach a workspace before running generate (use when the binary was built in a prior job)
    default: false
  workspace_root:
    type: string
    description: Path at which to attach the workspace; also prepended to PATH (only used when attach_workspace is true)
    default: /tmp/workspace
steps:
- checkout
- when:
    condition: << parameters.attach_workspace >>
    steps:
      - attach_workspace:
          at: << parameters.workspace_root >>
      - run:
          name: Add workspace binaries to PATH
          command: <<include(scripts/add_workspace_to_path.sh)>>
          environment:
            WORKSPACE_ROOT: << parameters.workspace_root >>
- generate:
    binary: << parameters.binary >>
    orb_namespace: << parameters.orb_namespace >>
    output: << parameters.output >>
    install_method: << parameters.install_method >>
    base_image: << parameters.base_image >>
    home_url: << parameters.home_url >>
    source_url: << parameters.source_url >>
    orb_dir: << parameters.orb_dir >>
    dry_run: << parameters.dry_run >>
