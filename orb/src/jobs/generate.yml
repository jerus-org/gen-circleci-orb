description: Run generate command in a dedicated job.
executor: default
parameters:
  binary:
    type: string
    description: Name of the binary to introspect (must be on PATH). Falls back to `binary` in the [orb] section of gen-circleci-orb.toml
    default: ''
  orb_namespace:
    type: string
    description: CircleCI orb namespace(s) to publish the orb under (repeatable). Falls back to `namespaces` in the [orb] section of gen-circleci-orb.toml
    default: ''
  output:
    type: string
    description: Project root directory (orb source is written to <output>/<orb-dir>/)
    default: .
  install_method:
    type: enum
    description: How the binary is installed in the generated Docker image. Falls back to `install_method` in the [orb] section of gen-circleci-orb.toml, then "binstall"
    default: binstall
    enum:
    - binstall
    - apt
    - local
  base_image:
    type: string
    description: Base Docker image for the generated executor. Falls back to `base_image` in the [orb] section of gen-circleci-orb.toml, then "debian:13-slim"
    default: ''
  home_url:
    type: string
    description: Home URL for the orb registry display section. Falls back to `home_url` in the [orb] section of gen-circleci-orb.toml
    default: ''
  source_url:
    type: string
    description: Source URL for the orb registry display section. Falls back to `source_url` in the [orb] section of gen-circleci-orb.toml
    default: ''
  orb_dir:
    type: string
    description: Subdirectory within --output where orb source is written. Falls back to `orb_dir` in the [orb] section of gen-circleci-orb.toml, then "orb"
    default: ''
  git_push_subcommand:
    type: string
    description: Subcommand name(s) whose generated jobs should include a set_https_remote step (repeatable). Use for subcommands that push to git, e.g. --git-push-subcommand save
    default: ''
  circleci_cli_version:
    type: string
    description: circleci-cli version to install in the generated Docker image executor. When set, adds a cli-installer builder stage that downloads the release tarball, verifies its SHA-256 checksum, and copies the binary into the final image.  Required when the wrapped binary calls `circleci` commands at runtime (e.g. when generating gen-circleci-orb's own orb)
    default: ''
  apt_packages:
    type: string
    description: 'Extra apt package(s) to install in the final Docker image stage (repeatable). Combined with the baseline packages (ca-certificates, git) and sorted alphanumerically. Example: --apt-packages libssl-dev --apt-packages pkg-config'
    default: ''
  dry_run:
    type: boolean
    description: Show planned output without writing any files
    default: false
  config:
    type: string
    description: Path to gen-circleci-orb.toml config file. Defaults to <output>/gen-circleci-orb.toml when not specified
    default: ''
  no_record:
    type: boolean
    description: Suppress auto-record for this run, even when `[record].enabled = true` in gen-circleci-orb.toml. Auto-record commits the regenerated orb source back to the current branch (GPG-signed) and pushes it, so the published orb always reflects the CLI. Whether to record, and the names of the env vars holding the signing material, are config-driven (the `[record]` section). Use this flag for local, test, and dry runs where no signing material is available
    default: false
  attach_workspace:
    type: boolean
    description: Attach a workspace before running the command (use when the binary was built in a prior job).
    default: false
  workspace_root:
    type: string
    description: Path at which to attach the workspace; also prepended to PATH (only used when attach_workspace is true).
    default: /tmp/workspace
  persist_orb_workspace:
    type: boolean
    description: Persist the regenerated orb dir to the workspace so downstream jobs (pack, review, the end-of-workflow push job) operate on it without an immediate push. Default false.
    default: false
  ssh_fingerprint:
    type: string
    description: SSH key fingerprint (a public-key hash, not a secret) used to push the regenerated orb with write authority. When set, the key is loaded and the read-only checkout key is dropped from the agent. Empty (default) falls back to the ambient environment credentials.
    default: ''
steps:
- checkout
- when:
    condition: << parameters.attach_workspace >>
    steps:
    - attach_workspace:
        at: << parameters.workspace_root >>
    - run:
        name: Add workspace binaries to PATH
        command: <<include(scripts/add-workspace-to-path.sh)>>
        environment:
          WORKSPACE_ROOT: << parameters.workspace_root >>
- when:
    condition: << parameters.ssh_fingerprint >>
    steps:
    - add_ssh_keys:
        fingerprints:
        - << parameters.ssh_fingerprint >>
    - run:
        name: Drop read-only checkout key from agent
        command: ssh-add -d ~/.ssh/id_rsa.pub || true
- generate:
    binary: << parameters.binary >>
    orb_namespace: << parameters.orb_namespace >>
    output: << parameters.output >>
    install_method: << parameters.install_method >>
    base_image: << parameters.base_image >>
    home_url: << parameters.home_url >>
    source_url: << parameters.source_url >>
    orb_dir: << parameters.orb_dir >>
    git_push_subcommand: << parameters.git_push_subcommand >>
    circleci_cli_version: << parameters.circleci_cli_version >>
    apt_packages: << parameters.apt_packages >>
    dry_run: << parameters.dry_run >>
    config: << parameters.config >>
    no_record: << parameters.no_record >>
- when:
    condition: << parameters.persist_orb_workspace >>
    steps:
    - persist_to_workspace:
        root: .
        paths:
        - << parameters.orb_dir >>
