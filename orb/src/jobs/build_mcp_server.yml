description: >
  Generate, compile, publish, and commit back the MCP server for a CircleCI orb.
  Runs after the orb is published: primes prior-version snapshots, generates and
  compiles the MCP server binary from the orb definition, uploads it to the GitHub
  release, then commits prior-versions/ and migrations/ back to the repository
  main branch using a signed commit via the GitHub App token.
docker:
  - image: jerusdp/gen-orb-mcp:<< parameters.gen_orb_mcp_tag >>
parameters:
  binary_name:
    type: string
    description: >
      Binary name (e.g. "my-tool"). Used to locate the compiled MCP binary at
      target/release/{binary_name_underscored}_mcp and to name the GitHub release asset.
  tag_prefix:
    type: string
    description: >
      Git tag prefix for VERSION extraction and prime scoping (e.g. "my-tool-v").
  orb_path:
    type: string
    description: Path to the orb source @orb.yml file
    default: orb/src/@orb.yml
  earliest_version:
    type: string
    description: Earliest orb version to include when priming prior-version snapshots
  prior_versions_dir:
    type: string
    description: Directory for prior-version snapshots
    default: prior-versions
  migrations_dir:
    type: string
    description: Directory for migration rule files
    default: migrations
  workspace_bin_path:
    type: string
    description: Workspace path where the binary was persisted by the build job
    default: /tmp/bin
  gen_orb_mcp_tag:
    type: string
    description: gen-orb-mcp Docker image tag (pin to a specific version for reproducibility)
    default: latest
steps:
  - checkout
  - attach_workspace:
      at: << parameters.workspace_bin_path >>
  - run:
      name: Set up git and environment
      command: <<include(scripts/build_mcp_server_setup.sh)>>
      environment:
        NAME: << parameters.binary_name >>
        TAG_PREFIX: << parameters.tag_prefix >>
        WORKSPACE_BIN_PATH: << parameters.workspace_bin_path >>
  - set_https_remote
  - run:
      name: Prime prior versions and migrations
      command: <<include(scripts/build_mcp_server_prime.sh)>>
      environment:
        ORB_PATH: << parameters.orb_path >>
        TAG_PREFIX: << parameters.tag_prefix >>
        EARLIEST_VERSION: << parameters.earliest_version >>
  - run:
      name: Generate and compile MCP server
      command: <<include(scripts/build_mcp_server_generate.sh)>>
      environment:
        NAME: << parameters.binary_name >>
        ORB_PATH: << parameters.orb_path >>
        PRIOR_VERSIONS_DIR: << parameters.prior_versions_dir >>
        MIGRATIONS_DIR: << parameters.migrations_dir >>
  - run:
      name: Publish MCP server binary to GitHub release
      command: <<include(scripts/build_mcp_server_publish.sh)>>
      environment:
        NAME: << parameters.binary_name >>
  - run:
      name: Commit back generated artifacts
      command: <<include(scripts/build_mcp_server_save.sh)>>
      environment:
        PRIOR_VERSIONS_DIR: << parameters.prior_versions_dir >>
        MIGRATIONS_DIR: << parameters.migrations_dir >>
