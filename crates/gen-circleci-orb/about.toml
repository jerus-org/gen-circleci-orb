# cargo-about configuration for generating THIRD-PARTY-LICENSES.md.
# The accepted list mirrors the license policy in deny.toml: permissive
# licenses plus the weak-copyleft licenses carried by specific transitive
# dependencies (LGPL-2.0-or-later via the OpenPGP/GPG-signing stack, MPL-2.0).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "LGPL-2.0-or-later",
    "MPL-2.0",
]

# Notices cover what ships in the binary: dev-only dependencies (test harness,
# etc.) are not distributed, so they are excluded.
ignore-dev-dependencies = true
