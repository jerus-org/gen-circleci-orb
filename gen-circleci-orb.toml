[orb]
binary = "gen-circleci-orb"
namespaces = ["jerus-org"]
orb_dir = "orb"
# gnupg is required at runtime by `generate --record` (GPG-signed commit-back).
apt_packages = ["gnupg"]

[subcommand.help]
generate_job = false

# The `config` subcommands edit gen-circleci-orb.toml from the CLI; they are
# developer tools, not CI jobs, so suppress their job generation.
[subcommand."add-job-group"]
generate_job = false

[subcommand."set-default"]
generate_job = false

[subcommand.show]
generate_job = false

[subcommand.suppress]
generate_job = false

[subcommand.unsuppress]
generate_job = false
