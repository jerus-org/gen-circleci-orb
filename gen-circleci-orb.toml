[orb]
binary = "gen-circleci-orb"
namespaces = ["jerus-org"]
orb_dir = "orb"
# gnupg is required at runtime by `generate --record` (GPG-signed commit-back).
apt_packages = ["gnupg"]
# Pinned Rust builder image for the Dockerfile `builder` stage. Kept here (not
# left to the generator's unpinned default) so the @sha256 digest survives
# regeneration; Renovate updates this digest via a customManager (renovate.json).
builder_image = "rust:1-slim-trixie@sha256:3b05f7c617a200c41c3506097f0d15fc193a1c93bfd8f141007b47cac8f95d3c"
# Hand-authored orb infrastructure (build/release commands, jobs and scripts)
# that `generate` does not produce. Registered here so the prune step preserves
# them — the orb tree is otherwise fully owned by (CLI subcommands ∪ config).
custom_files = [
    "src/commands/build_container.yml",
    "src/commands/build_rust_binary.yml",
    "src/commands/set_https_remote.yml",
    "src/jobs/build_container.yml",
    "src/jobs/build_rust_binary.yml",
    "src/scripts/build-container.sh",
    "src/scripts/build-rust-binary.sh",
    "src/scripts/persist-binary.sh",
    "src/scripts/set_https_remote.sh",
]

[subcommand.help]
generate_job = false

# The `config` subcommands edit gen-circleci-orb.toml from the CLI; they are
# developer tools, not CI jobs, so suppress their job generation.
[subcommand."add-job-group"]
generate_job = false

[subcommand."set-default"]
generate_job = false

[subcommand.show]
generate_job = false

[subcommand.suppress]
generate_job = false

[subcommand.unsuppress]
generate_job = false

# Auto-record: after `generate` regenerates the orb, the CI job commits the orb
# source back (GPG-signed) and pushes it to the PR branch so the change is
# reviewable, keeping the published orb in sync with the CLI. The values below
# are the *names* of the env vars holding the signing material and write token
# at runtime; the secret values themselves are never committed. The write token
# needs only contents:write on the PR branch (no GitHub App / bypass).
[record]
enabled = true
gpg_key_env = "BOT_GPG_KEY"
gpg_trust_env = "BOT_TRUST"
user_name_env = "BOT_USER_NAME"
user_email_env = "BOT_USER_EMAIL"
signing_key_env = "BOT_SIGN_KEY"
# Push uses the org SSH write key (loaded by add_ssh_keys in the regenerate-orb
# job), not a token — add_ssh_keys resolves the fingerprint at config-compile
# time and can't read env vars, so this is a value, not an env-var name.
push_ssh_fingerprint = "SHA256:OkxsH8Z6Iim6WDJBaII9eTT9aaO1f3eDc6IpsgYYPVg"
# Context(s) the record CI job attaches to obtain the values above:
# `release` supplies the BOT_* GPG signing material.
contexts = ["release"]

# Drives the generated validation + orb-release workflows (self-hosting: this
# repo's CI is generated by its own orb). The orb-release workflow is tag-gated
# on crate_tag_prefix and publishes the orb + MCP server; release.yml only runs
# the crate release, whose release_crate pushes the tag that triggers it.
[ci]
build_workflow = "validation"
release_workflow = "release"
requires_job = "toolkit/common_tests"
release_after_job = "release-gen-circleci-orb"
crate_tag_prefix = "gen-circleci-orb-v"
docker_namespace = "jerusdp"
docker_context = "docker"
orb_context = "orb-publishing"
mcp = true
mcp_context = ["release", "bot-check", "pcu-app"]
mcp_earliest_version = "0.0.11"
