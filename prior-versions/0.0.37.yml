version: '2.1'
description: |
  Generate a CircleCI orb to provide the facilities offered by a CLI program
display:
  home_url: https://github.com/jerus-org/gen-circleci-orb
  source_url: https://github.com/jerus-org/gen-circleci-orb
orbs: {}
commands:
  generate:
    description: Generate orb source files from a CLI binary's --help output
    parameters:
      output:
        type: string
        description: Project root directory (orb source is written to <output>/<orb-dir>/)
        default: .
        enum: null
      base_image:
        type: string
        description: Base Docker image for the generated executor
        default: debian:12-slim
        enum: null
      orb_namespace:
        type: string
        description: CircleCI orb namespace(s) to publish the orb under (repeatable)
        default: null
        enum: null
      binary:
        type: string
        description: Name of the binary to introspect (must be on PATH)
        default: null
        enum: null
      install_method:
        type: enum
        description: How the binary is installed in the generated Docker image
        default: binstall
        enum:
        - binstall
        - apt
      source_url:
        type: string
        description: Source URL for the orb registry display section
        default: ''
        enum: null
      orb_dir:
        type: string
        description: 'Subdirectory within --output where orb source is written (default: orb)'
        default: orb
        enum: null
      git_push_subcommand:
        type: string
        description: Subcommand name(s) whose generated jobs should include a set_https_remote step (repeatable). Use for subcommands that push to git, e.g. --git-push-subcommand save
        default: ''
        enum: null
      apt_packages:
        type: string
        description: 'Extra apt package(s) to install in the final Docker image stage (repeatable). Combined with the baseline packages (ca-certificates, git) and sorted alphanumerically. Example: --apt-packages libssl-dev --apt-packages pkg-config'
        default: ''
        enum: null
      circleci_cli_version:
        type: string
        description: circleci-cli version to install in the generated Docker image executor. When set, adds a cli-installer builder stage that downloads the release tarball, verifies its SHA-256 checksum, and copies the binary into the final image.  Required when the wrapped binary calls `circleci` commands at runtime (e.g. when generating gen-circleci-orb's own orb)
        default: ''
        enum: null
      dry_run:
        type: boolean
        description: Show planned output without writing any files
        default: false
        enum: null
      home_url:
        type: string
        description: Home URL for the orb registry display section
        default: ''
        enum: null
    steps:
    - run:
        command: <<include(scripts/generate.sh)>>
        name: generate
        working_directory: null
        environment:
          OUTPUT: << parameters.output >>
          BASE_IMAGE: << parameters.base_image >>
          APT_PACKAGES: << parameters.apt_packages >>
          INSTALL_METHOD: << parameters.install_method >>
          ORB_DIR: << parameters.orb_dir >>
          HOME_URL: << parameters.home_url >>
          ORB_NAMESPACE: << parameters.orb_namespace >>
          CIRCLECI_CLI_VERSION: << parameters.circleci_cli_version >>
          GIT_PUSH_SUBCOMMAND: << parameters.git_push_subcommand >>
          DRY_RUN: << parameters.dry_run >>
          BINARY: << parameters.binary >>
          SOURCE_URL: << parameters.source_url >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
  init:
    description: Wire orb generation into an existing repo's CI configuration
    parameters:
      build_workflow:
        type: string
        description: Name of the build/validation workflow to patch
        default: null
        enum: null
      requires_job:
        type: string
        description: Job in the build workflow that regenerate-orb should require
        default: ''
        enum: null
      binary:
        type: string
        description: Name of the binary to introspect (must be on PATH)
        default: null
        enum: null
      crate_tag_prefix:
        type: string
        description: Tag prefix used by `toolkit/release_crate` for the crate (e.g. `gen-orb-mcp-v`). Used to filter the `orb-release:` workflow trigger in config.yml and to normalise `CIRCLE_TAG` for `orb-tools/publish`
        default: null
        enum: null
      orb_context:
        type: string
        description: CircleCI context name holding orb publishing credentials
        default: orb-publishing
        enum: null
      mcp_earliest_version:
        type: string
        description: Earliest orb version to include when priming prior-version snapshots. Passed to gen-circleci-orb/build_mcp_server as `earliest_version`. Only used when --mcp is enabled
        default: 0.0.1
        enum: null
      mcp_context:
        type: string
        description: CircleCI context providing push authority for MCP server build + publish + save steps. Only used when --mcp is enabled
        default: pcu-app
        enum: null
      docker_orb_version:
        type: string
        description: circleci/docker orb version to pin in generated CI
        default: 3.0.1
        enum: null
      docker_context:
        type: string
        description: CircleCI context name holding Docker Hub credentials
        default: docker-credentials
        enum: null
      dry_run:
        type: boolean
        description: Show planned changes without modifying any files
        default: false
        enum: null
      mcp:
        type: boolean
        description: Wire in gen-orb-mcp MCP server generation + publish after orb publish
        default: false
        enum: null
      public_orb_namespace:
        type: string
        description: CircleCI namespace(s) to publish the orb under as a public orb (repeatable). Must be set correctly on first init — visibility cannot be changed after the orb is created
        default: ''
        enum: null
      ci_dir:
        type: string
        description: Path to the .circleci/ directory
        default: .circleci
        enum: null
      release_after_job:
        type: string
        description: Job in the release workflow after which the generated release jobs (build-binary-release, pack-orb-release, build-container, ensure-orb-registered) should be gated. This is the sole mechanism for specifying where the generated jobs plug into the existing pipeline topology
        default: null
        enum: null
      gen_circleci_orb_version:
        type: string
        description: Version of the jerus-org/gen-circleci-orb orb to pin in generated CI. Defaults to the version of this binary (orb and crate are released together)
        default: 0.0.31
        enum: null
      orb_dir:
        type: string
        description: Output directory for the generated orb source (relative to repo root)
        default: orb
        enum: null
      orb_tools_version:
        type: string
        description: circleci/orb-tools version to pin in generated CI
        default: 12.3.3
        enum: null
      release_workflow:
        type: string
        description: Name of the release workflow to patch
        default: null
        enum: null
      private_orb_namespace:
        type: string
        description: CircleCI namespace(s) to publish the orb under as a private orb (repeatable). Each listed namespace gets `--private` in its `circleci orb create` command. Must be set correctly on first init — visibility cannot be changed after the orb is created
        default: ''
        enum: null
      docker_namespace:
        type: string
        description: Docker Hub (or registry) namespace for the built container image
        default: null
        enum: null
    steps:
    - run:
        command: <<include(scripts/init.sh)>>
        name: init
        working_directory: null
        environment:
          DOCKER_NAMESPACE: << parameters.docker_namespace >>
          RELEASE_AFTER_JOB: << parameters.release_after_job >>
          CI_DIR: << parameters.ci_dir >>
          MCP_CONTEXT: << parameters.mcp_context >>
          CRATE_TAG_PREFIX: << parameters.crate_tag_prefix >>
          MCP_EARLIEST_VERSION: << parameters.mcp_earliest_version >>
          DRY_RUN: << parameters.dry_run >>
          DOCKER_CONTEXT: << parameters.docker_context >>
          PRIVATE_ORB_NAMESPACE: << parameters.private_orb_namespace >>
          REQUIRES_JOB: << parameters.requires_job >>
          BINARY: << parameters.binary >>
          BUILD_WORKFLOW: << parameters.build_workflow >>
          DOCKER_ORB_VERSION: << parameters.docker_orb_version >>
          MCP: << parameters.mcp >>
          RELEASE_WORKFLOW: << parameters.release_workflow >>
          PUBLIC_ORB_NAMESPACE: << parameters.public_orb_namespace >>
          ORB_CONTEXT: << parameters.orb_context >>
          GEN_CIRCLECI_ORB_VERSION: << parameters.gen_circleci_orb_version >>
          ORB_DIR: << parameters.orb_dir >>
          ORB_TOOLS_VERSION: << parameters.orb_tools_version >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
  build_container:
    description: Build and push a Docker image for a CLI binary, copying the binary from workspace.
    parameters:
      crate_tag_prefix:
        type: string
        description: Tag prefix to strip from CIRCLE_TAG to get the bare semver version
        default: null
        enum: null
      orb_dir:
        type: string
        description: Directory containing the Dockerfile
        default: orb
        enum: null
      binary:
        type: string
        description: Name of the binary (used for the Docker image name and binary filename)
        default: null
        enum: null
      docker_namespace:
        type: string
        description: Docker Hub namespace (e.g. jerusdp)
        default: null
        enum: null
    steps:
    - attach_workspace:
        at: /tmp/bin
    - setup_remote_docker
    - run:
        command: <<include(scripts/build-container.sh)>>
        name: Build and push Docker image
        working_directory: null
        environment:
          CRATE_TAG_PREFIX: << parameters.crate_tag_prefix >>
          BINARY: << parameters.binary >>
          DOCKER_NAMESPACE: << parameters.docker_namespace >>
          ORB_DIR: << parameters.orb_dir >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
  ensure_orb_registered:
    description: Ensure a CircleCI orb is registered, creating it if it does not exist
    parameters:
      orb_name:
        type: string
        description: The orb name to check/register (e.g. my-org/my-orb)
        default: null
        enum: null
      private:
        type: boolean
        description: Register the orb as private when creating it.  Must be set correctly on first creation — orb visibility cannot be changed after the orb is created.
        default: false
        enum: null
    steps:
    - run:
        command: <<include(scripts/ensure_orb_registered.sh)>>
        name: ensure-orb-registered
        working_directory: null
        environment:
          PRIVATE: << parameters.private >>
          ORB_NAME: << parameters.orb_name >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
  set_https_remote:
    description: |
      Remove the SSH insteadOf rewrite rule that CircleCI checkout injects and set both the fetch and push URLs for origin to HTTPS.
      CircleCI's checkout step writes url."ssh://git@github.com".insteadOf = https://github.com into ~/.gitconfig. This causes git and libgit2 (used by pcu push_commit) to transparently rewrite every HTTPS GitHub URL back to SSH, making git remote set-url have no observable effect on the effective URL. Without this step, pcu falls back to the read-only SSH deploy key instead of authenticating with the GitHub App token.
    parameters: {}
    steps:
    - run:
        command: <<include(scripts/set_https_remote.sh)>>
        name: Set HTTPS remote URLs (fetch and push)
        working_directory: null
        environment: {}
        shell: null
        background: null
        no_output_timeout: null
        when: null
  build_rust_binary:
    description: Build a Rust binary from a workspace package and persist it to workspace.
    parameters:
      binary:
        type: string
        description: Binary target name if it differs from the package name; defaults to package name
        default: ''
        enum: null
      cargo_args:
        type: string
        description: Additional arguments passed to cargo build --release
        default: ''
        enum: null
      package:
        type: string
        description: Cargo package name within the workspace (passed to --package)
        default: null
        enum: null
    steps:
    - run:
        command: <<include(scripts/build-rust-binary.sh)>>
        name: Build << parameters.package >> binary
        working_directory: null
        environment:
          PACKAGE: << parameters.package >>
          CARGO_ARGS: << parameters.cargo_args >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - run:
        command: <<include(scripts/persist-binary.sh)>>
        name: Persist binary to workspace
        working_directory: null
        environment:
          BINARY_OVERRIDE: << parameters.binary >>
          PACKAGE: << parameters.package >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - persist_to_workspace:
        root: /tmp/workspace
        paths:
        - .
jobs:
  build_mcp_server:
    description: |
      Generate, compile, publish, and commit back the MCP server for a CircleCI orb. Runs after the orb is published: primes prior-version snapshots, generates and compiles the MCP server binary from the orb definition, uploads it to the GitHub release, then commits prior-versions/ and migrations/ back to the repository main branch using a signed commit via the GitHub App token.
    executor: null
    docker:
    - image: jerusdp/gen-orb-mcp:<< parameters.gen_orb_mcp_tag >>
      auth: null
      aws_auth: null
      name: null
      entrypoint: null
      command: null
      user: null
      environment: {}
    machine: null
    macos: null
    resource_class: null
    working_directory: null
    environment: {}
    shell: null
    parameters:
      tag_prefix:
        type: string
        description: |
          Git tag prefix for VERSION extraction and prime scoping (e.g. "my-tool-v").
        default: null
        enum: null
      orb_path:
        type: string
        description: Path to the orb source @orb.yml file
        default: orb/src/@orb.yml
        enum: null
      earliest_version:
        type: string
        description: Earliest orb version to include when priming prior-version snapshots
        default: null
        enum: null
      binary_name:
        type: string
        description: |
          Binary name (e.g. "my-tool"). Used to locate the compiled MCP binary at target/release/{binary_name_underscored}_mcp and to name the GitHub release asset.
        default: null
        enum: null
      gen_orb_mcp_tag:
        type: string
        description: gen-orb-mcp Docker image tag (pin to a specific version for reproducibility)
        default: latest
        enum: null
      prior_versions_dir:
        type: string
        description: Directory for prior-version snapshots
        default: prior-versions
        enum: null
      migrations_dir:
        type: string
        description: Directory for migration rule files
        default: migrations
        enum: null
      workspace_bin_path:
        type: string
        description: Workspace path where the binary was persisted by the build job
        default: /tmp/bin
        enum: null
    steps:
    - checkout
    - attach_workspace:
        at: << parameters.workspace_bin_path >>
    - run:
        command: <<include(scripts/build-mcp-server-setup.sh)>>
        name: Set up git and environment
        working_directory: null
        environment:
          WORKSPACE_BIN_PATH: << parameters.workspace_bin_path >>
          NAME: << parameters.binary_name >>
          TAG_PREFIX: << parameters.tag_prefix >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - set_https_remote
    - run:
        command: <<include(scripts/build-mcp-server-prime.sh)>>
        name: Prime prior versions and migrations
        working_directory: null
        environment:
          EARLIEST_VERSION: << parameters.earliest_version >>
          ORB_PATH: << parameters.orb_path >>
          TAG_PREFIX: << parameters.tag_prefix >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - run:
        command: <<include(scripts/build-mcp-server-generate.sh)>>
        name: Generate and compile MCP server
        working_directory: null
        environment:
          NAME: << parameters.binary_name >>
          PRIOR_VERSIONS_DIR: << parameters.prior_versions_dir >>
          ORB_PATH: << parameters.orb_path >>
          MIGRATIONS_DIR: << parameters.migrations_dir >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - run:
        command: <<include(scripts/build-mcp-server-publish.sh)>>
        name: Publish MCP server binary to GitHub release
        working_directory: null
        environment:
          NAME: << parameters.binary_name >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    - run:
        command: <<include(scripts/build-mcp-server-save.sh)>>
        name: Commit back generated artifacts
        working_directory: null
        environment:
          MIGRATIONS_DIR: << parameters.migrations_dir >>
          PRIOR_VERSIONS_DIR: << parameters.prior_versions_dir >>
        shell: null
        background: null
        no_output_timeout: null
        when: null
    parallelism: null
    circleci_ip_ranges: null
  build_rust_binary:
    description: Build a Rust binary from a workspace package and persist it to workspace for use in subsequent jobs.
    executor: null
    docker:
    - image: << parameters.rust_image >>
      auth: null
      aws_auth: null
      name: null
      entrypoint: null
      command: null
      user: null
      environment: {}
    machine: null
    macos: null
    resource_class: null
    working_directory: null
    environment: {}
    shell: null
    parameters:
      cargo_args:
        type: string
        description: Additional arguments passed to cargo build --release
        default: ''
        enum: null
      rust_image:
        type: string
        description: Docker image to use for the Rust build
        default: rust:latest
        enum: null
      package:
        type: string
        description: Cargo package name within the workspace (passed to --package)
        default: null
        enum: null
      binary:
        type: string
        description: Binary target name if it differs from the package name; defaults to package name
        default: ''
        enum: null
    steps:
    - checkout
    - build_rust_binary:
        package: << parameters.package >>
        binary: << parameters.binary >>
        cargo_args: << parameters.cargo_args >>
    parallelism: null
    circleci_ip_ranges: null
  build_container:
    description: Build and push a Docker image for a CLI binary.
    executor: null
    docker:
    - image: cimg/base:stable
      auth: null
      aws_auth: null
      name: null
      entrypoint: null
      command: null
      user: null
      environment: {}
    machine: null
    macos: null
    resource_class: null
    working_directory: null
    environment: {}
    shell: null
    parameters:
      orb_dir:
        type: string
        description: Directory containing the Dockerfile
        default: orb
        enum: null
      docker_namespace:
        type: string
        description: Docker Hub namespace (e.g. jerusdp)
        default: null
        enum: null
      crate_tag_prefix:
        type: string
        description: Tag prefix to strip from CIRCLE_TAG to get the bare semver version
        default: null
        enum: null
      binary:
        type: string
        description: Name of the binary (used for the Docker image name)
        default: null
        enum: null
    steps:
    - checkout
    - build_container:
        binary: << parameters.binary >>
        docker_namespace: << parameters.docker_namespace >>
        orb_dir: << parameters.orb_dir >>
        crate_tag_prefix: << parameters.crate_tag_prefix >>
    parallelism: null
    circleci_ip_ranges: null
  generate:
    description: Run generate command in a dedicated job.
    executor: default
    docker: null
    machine: null
    macos: null
    resource_class: null
    working_directory: null
    environment: {}
    shell: null
    parameters:
      source_url:
        type: string
        description: Source URL for the orb registry display section
        default: ''
        enum: null
      attach_workspace:
        type: boolean
        description: Attach a workspace before running the command (use when the binary was built in a prior job).
        default: false
        enum: null
      orb_dir:
        type: string
        description: 'Subdirectory within --output where orb source is written (default: orb)'
        default: orb
        enum: null
      install_method:
        type: enum
        description: How the binary is installed in the generated Docker image
        default: binstall
        enum:
        - binstall
        - apt
      apt_packages:
        type: string
        description: 'Extra apt package(s) to install in the final Docker image stage (repeatable). Combined with the baseline packages (ca-certificates, git) and sorted alphanumerically. Example: --apt-packages libssl-dev --apt-packages pkg-config'
        default: ''
        enum: null
      output:
        type: string
        description: Project root directory (orb source is written to <output>/<orb-dir>/)
        default: .
        enum: null
      dry_run:
        type: boolean
        description: Show planned output without writing any files
        default: false
        enum: null
      binary:
        type: string
        description: Name of the binary to introspect (must be on PATH)
        default: null
        enum: null
      orb_namespace:
        type: string
        description: CircleCI orb namespace(s) to publish the orb under (repeatable)
        default: null
        enum: null
      home_url:
        type: string
        description: Home URL for the orb registry display section
        default: ''
        enum: null
      git_push_subcommand:
        type: string
        description: Subcommand name(s) whose generated jobs should include a set_https_remote step (repeatable). Use for subcommands that push to git, e.g. --git-push-subcommand save
        default: ''
        enum: null
      base_image:
        type: string
        description: Base Docker image for the generated executor
        default: debian:12-slim
        enum: null
      circleci_cli_version:
        type: string
        description: circleci-cli version to install in the generated Docker image executor. When set, adds a cli-installer builder stage that downloads the release tarball, verifies its SHA-256 checksum, and copies the binary into the final image.  Required when the wrapped binary calls `circleci` commands at runtime (e.g. when generating gen-circleci-orb's own orb)
        default: ''
        enum: null
      workspace_root:
        type: string
        description: Path at which to attach the workspace; also prepended to PATH (only used when attach_workspace is true).
        default: /tmp/workspace
        enum: null
    steps:
    - checkout
    - when:
        condition: << parameters.attach_workspace >>
        steps:
        - attach_workspace:
            at: << parameters.workspace_root >>
        - run:
            command: <<include(scripts/add-workspace-to-path.sh)>>
            name: Add workspace binaries to PATH
            working_directory: null
            environment:
              WORKSPACE_ROOT: << parameters.workspace_root >>
            shell: null
            background: null
            no_output_timeout: null
            when: null
    - generate:
        binary: << parameters.binary >>
        orb_namespace: << parameters.orb_namespace >>
        output: << parameters.output >>
        install_method: << parameters.install_method >>
        base_image: << parameters.base_image >>
        home_url: << parameters.home_url >>
        source_url: << parameters.source_url >>
        orb_dir: << parameters.orb_dir >>
        git_push_subcommand: << parameters.git_push_subcommand >>
        circleci_cli_version: << parameters.circleci_cli_version >>
        apt_packages: << parameters.apt_packages >>
        dry_run: << parameters.dry_run >>
    parallelism: null
    circleci_ip_ranges: null
  init:
    description: Run init command in a dedicated job.
    executor: default
    docker: null
    machine: null
    macos: null
    resource_class: null
    working_directory: null
    environment: {}
    shell: null
    parameters:
      requires_job:
        type: string
        description: Job in the build workflow that regenerate-orb should require
        default: ''
        enum: null
      docker_orb_version:
        type: string
        description: circleci/docker orb version to pin in generated CI
        default: 3.0.1
        enum: null
      release_after_job:
        type: string
        description: Job in the release workflow after which the generated release jobs (build-binary-release, pack-orb-release, build-container, ensure-orb-registered) should be gated. This is the sole mechanism for specifying where the generated jobs plug into the existing pipeline topology
        default: null
        enum: null
      orb_tools_version:
        type: string
        description: circleci/orb-tools version to pin in generated CI
        default: 12.3.3
        enum: null
      orb_dir:
        type: string
        description: Output directory for the generated orb source (relative to repo root)
        default: orb
        enum: null
      orb_context:
        type: string
        description: CircleCI context name holding orb publishing credentials
        default: orb-publishing
        enum: null
      release_workflow:
        type: string
        description: Name of the release workflow to patch
        default: null
        enum: null
      docker_namespace:
        type: string
        description: Docker Hub (or registry) namespace for the built container image
        default: null
        enum: null
      binary:
        type: string
        description: Name of the binary to introspect (must be on PATH)
        default: null
        enum: null
      gen_circleci_orb_version:
        type: string
        description: Version of the jerus-org/gen-circleci-orb orb to pin in generated CI. Defaults to the version of this binary (orb and crate are released together)
        default: 0.0.31
        enum: null
      mcp_earliest_version:
        type: string
        description: Earliest orb version to include when priming prior-version snapshots. Passed to gen-circleci-orb/build_mcp_server as `earliest_version`. Only used when --mcp is enabled
        default: 0.0.1
        enum: null
      dry_run:
        type: boolean
        description: Show planned changes without modifying any files
        default: false
        enum: null
      attach_workspace:
        type: boolean
        description: Attach a workspace before running the command (use when the binary was built in a prior job).
        default: false
        enum: null
      mcp_context:
        type: string
        description: CircleCI context providing push authority for MCP server build + publish + save steps. Only used when --mcp is enabled
        default: pcu-app
        enum: null
      private_orb_namespace:
        type: string
        description: CircleCI namespace(s) to publish the orb under as a private orb (repeatable). Each listed namespace gets `--private` in its `circleci orb create` command. Must be set correctly on first init — visibility cannot be changed after the orb is created
        default: ''
        enum: null
      crate_tag_prefix:
        type: string
        description: Tag prefix used by `toolkit/release_crate` for the crate (e.g. `gen-orb-mcp-v`). Used to filter the `orb-release:` workflow trigger in config.yml and to normalise `CIRCLE_TAG` for `orb-tools/publish`
        default: null
        enum: null
